<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Amsterdam UMC - Account aanmaken</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <div class="page-container">

        <div class="logo-section">
            <h1>Amsterdam UMC</h1>
        </div>

        <div class="login-card">

            <h2>Account aanmaken</h2>

            <form>

                <div class="input-group">
                    <label for="email">E-mailadres</label>
                    <input type="email" id="email" placeholder="Voer e-mailadres in">
                </div>

                <div class="input-group">
                    <label for="name">Voor- en achternaam</label>
                    <input type="text" id="name" placeholder="Voer volledige naam in">
                </div>

                <div class="input-group">
                    <label for="geboortedatum">Geboortedatum</label>
                    <input type="date" id="geboortedatum">
                </div>

                <div class="input-group">
                    <label for="password">Wachtwoord</label>
                    <input type="password" id="password" placeholder="Kies een wachtwoord">
                </div>

                <p id="error-msg" style="color:#760404; margin-bottom:12px; display:none;"></p>

                <button type="button" id="registerBtn" class="btn-rood">Account aanmaken</button>

            </form>

        </div>

        <div class="register-card">
            <p>Al een account?</p>
            <button class="btn-blauw" onclick="window.location.href='/'">Inloggen</button>
        </div>

    </div>

    <script src="{{ url_for('static', filename='javascript/registreer.js') }}"></script>

</body>

</html>
